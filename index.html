<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CL21 | Clean Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        /* Clean Table Styles */
        tr { border-bottom: 1px solid #e2e8f0; }
        tr:last-child { border: none; }
        
        /* Mobile Nav Fix */
        .m-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; height: 65px; z-index: 50; }
        .m-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #94a3b8; }
        .m-nav-btn.active { color: #059669; }

        input, select { border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="pb-20 lg:pb-0">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-xl">
            <h1 class="text-2xl font-bold mb-2 text-slate-900">CL21 Login</h1>
            <p class="text-xs text-slate-400 mb-6 font-semibold uppercase tracking-wider">Oil Control System</p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-3 rounded-lg outline-none bg-slate-50 font-medium" required>
                <input type="password" id="pIn" placeholder="Password" class="w-full p-3 rounded-lg outline-none bg-slate-50 font-medium" required>
                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold text-sm uppercase tracking-wide">Enter System</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden flex flex-col lg:flex-row min-h-screen">
        
        <aside class="hidden lg:flex w-64 bg-white border-r flex-col p-6 sticky top-0 h-screen">
            <div class="font-bold text-xl mb-10 tracking-tight text-emerald-600">CL21_OIL</div>
            <nav class="flex-1 space-y-1">
                <button onclick="nav('dash')" id="d-dash" class="w-full text-left px-4 py-3 rounded-lg font-bold text-sm bg-emerald-50 text-emerald-700">Dashboard</button>
                <button onclick="nav('admin')" id="d-admin" class="admin-only w-full text-left px-4 py-3 rounded-lg font-bold text-sm text-slate-500 hover:bg-slate-50">Admin Panel</button>
            </nav>
            <button onclick="location.reload()" class="text-red-500 text-xs font-bold text-left px-4 py-3">Logout</button>
        </aside>

        <nav class="lg:hidden m-nav">
            <button onclick="nav('dash')" id="m-dash" class="m-nav-btn active"><i class="fa-solid fa-table-list mb-1 text-lg"></i>Data</button>
            <button onclick="nav('admin')" id="m-admin" class="m-nav-btn admin-only"><i class="fa-solid fa-gear mb-1 text-lg"></i>Admin</button>
            <button onclick="location.reload()" class="m-nav-btn"><i class="fa-solid fa-right-from-bracket mb-1 text-lg"></i>Exit</button>
        </nav>

        <main class="flex-1 p-4 lg:p-10">
            
            <div id="view-dash" class="max-w-5xl mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Calculated Total (Liters)</p>
                        <h2 class="text-4xl font-extrabold text-slate-900" id="totalDisplay">0.00</h2>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Filter Data</p>
                            <div class="flex gap-2">
                                <select id="fMonth" onchange="renderLogs()" class="flex-1 p-2 rounded border text-xs font-bold bg-slate-50 outline-none"></select>
                                <select id="fYear" onchange="renderLogs()" class="flex-1 p-2 rounded border text-xs font-bold bg-slate-50 outline-none"></select>
                            </div>
                        </div>
                        <button onclick="exportData()" class="bg-slate-900 text-white px-4 py-3 rounded-lg text-xs font-bold uppercase"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Add Fuel Record</h3>
                    <form id="oilForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                        <input type="date" id="iDate" required class="p-3 bg-slate-50 rounded border text-sm font-medium outline-none">
                        <select id="iPlate" onchange="syncType()" required class="p-3 bg-slate-50 rounded border text-sm font-medium outline-none"></select>
                        <input type="text" id="iType" readonly class="p-3 bg-slate-100 rounded border text-sm font-medium text-slate-400" placeholder="Model Class">
                        <select id="iRoute" required class="p-3 bg-slate-50 rounded border text-sm font-medium outline-none"></select>
                        <input type="number" id="iAmt" step="0.01" required placeholder="Liters (L)" class="p-3 bg-emerald-50 rounded border border-emerald-100 text-sm font-bold text-emerald-700">
                        <button type="submit" class="lg:col-span-5 bg-emerald-600 text-white py-3 rounded-lg font-bold text-sm uppercase">Save Entry</button>
                    </form>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Date</th>
                                <th class="px-6 py-4">Plate #</th>
                                <th class="px-6 py-4">Details</th>
                                <th class="px-6 py-4 text-right">Liters</th>
                                <th class="px-6 py-4 text-right admin-only">Action</th>
                            </tr>
                        </thead>
                        <tbody id="logTable" class="text-slate-600"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-admin" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex gap-2 border-b">
                    <button onclick="tab('users')" id="t-users" class="px-4 py-2 font-bold text-sm border-b-2 border-emerald-600 text-emerald-600">Users</button>
                    <button onclick="tab('cars')" id="t-cars" class="px-4 py-2 font-bold text-sm text-slate-400">Vehicles</button>
                    <button onclick="tab('roads')" id="t-roads" class="px-4 py-2 font-bold text-sm text-slate-400">Routes</button>
                </div>

                <div id="sec-users" class="space-y-4">
                    <form id="uForm" class="flex gap-2">
                        <input type="text" id="uName" placeholder="New Username" class="flex-1 p-3 rounded border text-sm outline-none" required>
                        <input type="password" id="uPass" placeholder="Password" class="flex-1 p-3 rounded border text-sm outline-none" required>
                        <button type="submit" class="bg-slate-900 text-white px-6 rounded-lg font-bold text-xs uppercase">Create</button>
                    </form>
                    <div id="list-users" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                </div>

                <div id="sec-cars" class="hidden space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="vPlate" placeholder="Plate #" class="flex-1 p-3 rounded border text-sm font-bold uppercase outline-none">
                        <input type="text" id="vTypeManual" placeholder="Type" class="flex-1 p-3 rounded border text-sm outline-none">
                        <button onclick="addVehicle()" class="bg-emerald-600 text-white px-6 rounded-lg font-bold text-xs uppercase">Register</button>
                    </div>
                    <div id="list-cars" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                </div>

                <div id="sec-roads" class="hidden space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="rName" placeholder="New Route" class="flex-1 p-3 rounded border text-sm outline-none">
                        <button onclick="addRoute()" class="bg-slate-900 text-white px-6 rounded-lg font-bold text-lg">+</button>
                    </div>
                    <div id="list-roads" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let session = null;
        const db = {
            users: JSON.parse(localStorage.getItem('cl21_users')) || [{ u: 'admin', p: 'cambo@123', role: 'admin' }],
            config: JSON.parse(localStorage.getItem('cl21_cfg')) || { vehicles: [], routes: ['Phnom Penh'] },
            logs: JSON.parse(localStorage.getItem('cl21_logs')) || []
        };

        function nav(v) {
            document.getElementById('view-dash').classList.toggle('hidden', v !== 'dash');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
            
            // Sync UI
            document.getElementById('d-dash').className = (v==='dash') ? "w-full text-left px-4 py-3 rounded-lg font-bold text-sm bg-emerald-50 text-emerald-700" : "w-full text-left px-4 py-3 rounded-lg font-bold text-sm text-slate-500 hover:bg-slate-50";
            document.getElementById('d-admin').className = (v==='admin') ? "admin-only w-full text-left px-4 py-3 rounded-lg font-bold text-sm bg-emerald-50 text-emerald-700" : "admin-only w-full text-left px-4 py-3 rounded-lg font-bold text-sm text-slate-500 hover:bg-slate-50";
            
            document.getElementById('m-dash').classList.toggle('active', v === 'dash');
            document.getElementById('m-admin').classList.toggle('active', v === 'admin');
        }

        function tab(t) {
            ['users', 'cars', 'roads'].forEach(x => {
                document.getElementById(`sec-${x}`).classList.toggle('hidden', x !== t);
                document.getElementById(`t-${x}`).className = (x===t) ? "px-4 py-2 font-bold text-sm border-b-2 border-emerald-600 text-emerald-600" : "px-4 py-2 font-bold text-sm text-slate-400";
            });
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = db.users.find(x => x.u === document.getElementById('uIn').value && x.p === document.getElementById('pIn').value);
            if(user) {
                session = user;
                if(user.role === 'admin') document.body.classList.add('is-admin');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                init();
            } else alert("Invalid username or password");
        };

        function init() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('fMonth').innerHTML = '<option value="all">Any Month</option>' + months.map((m, i) => `<option value="${i}">${m.toUpperCase()}</option>`).join('');
            let ys = '<option value="all">Any Year</option>'; for(let y=2026; y<=2030; y++) ys += `<option value="${y}">${y}</option>`;
            document.getElementById('fYear').innerHTML = ys;
            
            document.getElementById('fMonth').value = new Date().getMonth();
            document.getElementById('fYear').value = new Date().getFullYear();
            document.getElementById('iDate').valueAsDate = new Date();
            refresh();
        }

        function renderLogs() {
            const m = document.getElementById('fMonth').value;
            const y = document.getElementById('fYear').value;
            let total = 0;

            const filtered = db.logs.filter(l => {
                const d = new Date(l.date);
                const userMatch = (session.role === 'admin' || l.user === session.u);
                const monthMatch = (m === 'all' || d.getMonth().toString() === m);
                const yearMatch = (y === 'all' || d.getFullYear().toString() === y);
                return userMatch && monthMatch && yearMatch;
            });

            document.getElementById('logTable').innerHTML = filtered.map(l => {
                total += l.amt;
                return `<tr>
                    <td class="px-6 py-4 text-xs font-medium text-slate-400">${new Date(l.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 font-bold text-slate-900">${l.plate}</td>
                    <td class="px-6 py-4 text-xs font-semibold">${l.type} <span class="text-slate-300 mx-1">/</span> ${l.route}</td>
                    <td class="px-6 py-4 text-right font-bold text-emerald-600">${l.amt.toFixed(2)}L</td>
                    <td class="px-6 py-4 text-right admin-only"><button onclick="delLog(${l.id})" class="text-red-300 hover:text-red-600 px-2">Delete</button></td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="py-10 text-center text-slate-300">No records found</td></tr>';

            document.getElementById('totalDisplay').innerText = total.toFixed(2) + " L";
        }

        document.getElementById('oilForm').onsubmit = (e) => {
            e.preventDefault();
            const plate = document.getElementById('iPlate').value;
            if(!plate) return;
            const type = db.config.vehicles.find(v => v.plate === plate).type;
            db.logs.unshift({ id: Date.now(), plate, type, route: document.getElementById('iRoute').value, amt: parseFloat(document.getElementById('iAmt').value), user: session.u, date: new Date(document.getElementById('iDate').value).toISOString() });
            localStorage.setItem('cl21_logs', JSON.stringify(db.logs));
            document.getElementById('iAmt').value = ''; renderLogs();
        };

        window.delLog = (id) => { if(confirm("Confirm delete?")){ db.logs = db.logs.filter(x => x.id !== id); localStorage.setItem('cl21_logs', JSON.stringify(db.logs)); renderLogs(); }};
        window.syncType = () => { const v = db.config.vehicles.find(x => x.plate === document.getElementById('iPlate').value); document.getElementById('iType').value = v ? v.type : ''; };
        window.addVehicle = () => { const p = document.getElementById('vPlate').value.trim(); const t = document.getElementById('vTypeManual').value.trim(); if(!p || !t) return; db.config.vehicles.push({ plate: p.toUpperCase(), type: t.toUpperCase() }); save(); document.getElementById('vPlate').value = ''; document.getElementById('vTypeManual').value = ''; };
        window.addRoute = () => { const r = document.getElementById('rName').value.trim(); if(!r) return; db.config.routes.push(r); save(); document.getElementById('rName').value = ''; };
        window.save = () => { localStorage.setItem('cl21_cfg', JSON.stringify(db.config)); refresh(); };

        function refresh() {
            renderLogs();
            document.getElementById('list-users').innerHTML = db.users.map((u, i) => `<div class="p-3 bg-white border rounded flex justify-between items-center text-xs font-bold uppercase shadow-sm">${u.u} ${u.u !== 'admin' ? `<button onclick="db.users.splice(${i},1); localStorage.setItem('cl21_users', JSON.stringify(db.users)); refresh()" class="text-red-400">DEL</button>` : ''}</div>`).join('');
            document.getElementById('list-cars').innerHTML = db.config.vehicles.map((v, i) => `<div class="p-3 bg-white border rounded flex justify-between items-center text-xs font-bold uppercase shadow-sm">${v.plate} <span class="text-slate-300">(${v.type})</span> <button onclick="db.config.vehicles.splice(${i},1); save()" class="text-red-400">DEL</button></div>`).join('');
            document.getElementById('list-roads').innerHTML = db.config.routes.map((r, i) => `<div class="p-2 bg-white border rounded flex justify-between items-center text-[10px] font-bold shadow-sm">${r} <button onclick="db.config.routes.splice(${i},1); save()" class="text-red-400">×</button></div>`).join('');
            document.getElementById('iPlate').innerHTML = '<option value="">Select Plate</option>' + db.config.vehicles.map(v => `<option value="${v.plate}">${v.plate}</option>`).join('');
            document.getElementById('iRoute').innerHTML = db.config.routes.map(r => `<option>${r}</option>`).join('');
            syncType();
        }

        window.exportData = () => {
            let csv = "Date,Plate,Type,Route,User,Liters\n";
            db.logs.forEach(l => csv += `${new Date(l.date).toLocaleDateString()},${l.plate},${l.type},${l.route},${l.user},${l.amt}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'CL21_Report.csv'; a.click();
        };
    </script>
</body>
</html>
