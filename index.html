<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CL21 | Fuel Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        .active-tab { color: #059669; border-bottom: 3px solid #059669; }
        input, select { border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="pb-10">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h1 class="text-xl font-black text-center mb-6 tracking-tight text-slate-800">CL21 FUEL SYSTEM</h1>
            <form id="loginForm" class="space-y-3">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-4 rounded-xl bg-slate-50 outline-none font-bold text-center border">
                <input type="password" id="pIn" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-50 outline-none font-bold text-center border">
                <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black tracking-widest text-sm">ACCESS</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="font-black text-emerald-600 text-lg">CL21_OIL</div>
            <button onclick="location.reload()" class="text-red-500 font-black text-[10px] uppercase">Logout</button>
        </header>

        <nav class="flex bg-white border-b sticky top-[60px] z-50">
            <button onclick="nav('dash')" id="m-dash" class="flex-1 py-4 text-[10px] font-black uppercase active-tab">Dashboard</button>
            <button onclick="nav('admin')" id="m-admin" class="admin-only flex-1 py-4 text-[10px] font-black uppercase text-slate-400">Settings</button>
        </nav>

        <main class="p-4 max-w-2xl mx-auto space-y-6">
            
            <div id="view-dash" class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-end">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Consumption</p>
                        <h2 class="text-4xl font-black text-slate-900" id="totalDisplay">0.00</h2>
                    </div>
                    <button onclick="exportCSV()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase">Export CSV</button>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <select id="fMonth" onchange="renderLogs()" class="p-3 bg-white border rounded-xl text-xs font-bold"></select>
                    <select id="fYear" onchange="renderLogs()" class="p-3 bg-white border rounded-xl text-xs font-bold"></select>
                    <input type="text" id="fSearch" oninput="renderLogs()" placeholder="Search Plate #..." class="col-span-2 p-3 border rounded-xl text-sm font-black uppercase outline-none shadow-sm">
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Log Fuel Entry</h3>
                    <form id="oilForm" class="grid grid-cols-2 gap-3">
                        <input type="date" id="iDate" required class="p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                        <input list="plateList" id="iPlate" placeholder="PLATE #" onchange="syncType()" required class="p-3 border rounded-xl text-xs font-black uppercase">
                        <datalist id="plateList"></datalist>
                        <input type="text" id="iType" readonly class="p-3 bg-slate-100 border rounded-xl text-xs font-bold text-slate-400 uppercase" placeholder="TYPE">
                        <select id="iRoute" required class="p-3 border rounded-xl text-xs font-bold"></select>
                        <input type="number" id="iAmt" step="0.01" placeholder="LITERS" required class="col-span-2 p-4 bg-emerald-50 border-emerald-200 border rounded-xl text-lg font-black text-emerald-800 text-center">
                        <button type="submit" class="col-span-2 bg-emerald-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-100">Submit Log</button>
                    </form>
                </div>

                <div id="logTable" class="space-y-3"></div>
            </div>

            <div id="view-admin" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                    <h3 class="font-black text-xs uppercase text-slate-400">Manage Fleet</h3>
                    <div class="flex gap-2">
                        <input type="text" id="vPlate" placeholder="PLATE" class="flex-1 p-3 border rounded-xl text-xs font-bold uppercase bg-slate-50">
                        <input type="text" id="vTypeManual" placeholder="TYPE" class="flex-1 p-3 border rounded-xl text-xs font-bold uppercase bg-slate-50">
                        <button onclick="addVehicle()" class="bg-emerald-600 text-white px-6 rounded-xl font-black text-xs">ADD</button>
                    </div>
                    <input type="text" id="vSearch" oninput="refreshAdminLists()" placeholder="Filter Vehicles..." class="w-full p-3 bg-white border rounded-xl text-xs font-bold uppercase outline-none">
                    <div id="list-cars" class="space-y-1 max-h-48 overflow-y-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                    <h3 class="font-black text-xs uppercase text-slate-400">Manage Routes</h3>
                    <div class="flex gap-2">
                        <input type="text" id="rName" placeholder="ROUTE NAME" class="flex-1 p-3 border rounded-xl text-xs font-bold uppercase bg-slate-50">
                        <button onclick="addRoute()" class="bg-slate-900 text-white px-8 rounded-xl font-black">+</button>
                    </div>
                    <input type="text" id="rSearch" oninput="refreshAdminLists()" placeholder="Filter Routes..." class="w-full p-3 bg-white border rounded-xl text-xs font-bold uppercase outline-none">
                    <div id="list-roads" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                    <h3 class="font-black text-xs uppercase text-slate-400">Users List</h3>
                    <div id="list-users" class="space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDITjn7k_fWas0YJgOYh5daG3YARqWe9n0",
            authDomain: "cl21-oil-system.firebaseapp.com",
            projectId: "cl21-oil-system",
            storageBucket: "cl21-oil-system.firebasestorage.app",
            messagingSenderId: "482675024663",
            appId: "1:482675024663:web:036e7296a4fd0fd539cd52"
        };

        const app = initializeApp(firebaseConfig);
        const fs = getFirestore(app);

        let session = null;
        let db = { users: [], config: { vehicles: [], routes: [] }, logs: [] };
        let currentFilteredResults = [];

        // FIREBASE SYNC
        onSnapshot(collection(fs, "users"), s => {
            db.users = s.docs.map(d => ({ id: d.id, ...d.data() }));
            refreshAdminLists();
        });

        onSnapshot(doc(fs, "settings", "config"), s => {
            if (s.exists()) { db.config = s.data(); refreshAdminLists(); }
            else { setDoc(doc(fs, "settings", "config"), { vehicles: [], routes: ['Phnom Penh'] }); }
        });

        onSnapshot(query(collection(fs, "oil_logs"), orderBy("date", "desc")), s => {
            db.logs = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLogs();
        });

        // UI TABS
        window.nav = (v) => {
            document.getElementById('view-dash').classList.toggle('hidden', v !== 'dash');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
            document.getElementById('m-dash').className = v === 'dash' ? "flex-1 py-4 text-[10px] font-black uppercase active-tab" : "flex-1 py-4 text-[10px] font-black uppercase text-slate-400";
            document.getElementById('m-admin').className = v === 'admin' ? "flex-1 py-4 text-[10px] font-black uppercase active-tab" : "flex-1 py-4 text-[10px] font-black uppercase text-slate-400";
        };

        // LOGIN SYSTEM
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = db.users.find(x => x.u === document.getElementById('uIn').value && x.p === document.getElementById('pIn').value);
            if(u) {
                session = u;
                if(u.role === 'admin') document.body.classList.add('is-admin');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                setupSelectors();
            } else alert("ACCESS DENIED");
        };

        function setupSelectors() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('fMonth').innerHTML = '<option value="all">ANY MONTH</option>' + months.map((m, i) => `<option value="${i}">${m.toUpperCase()}</option>`).join('');
            document.getElementById('fYear').innerHTML = '<option value="all">ANY YEAR</option>' + [2026, 2027, 2028].map(y => `<option value="${y}">${y}</option>`).join('');
            document.getElementById('fMonth').value = new Date().getMonth();
            document.getElementById('fYear').value = new Date().getFullYear();
            document.getElementById('iDate').valueAsDate = new Date();
            refreshAdminLists();
        }

        // RENDER LOGS
        window.renderLogs = () => {
            const m = document.getElementById('fMonth').value;
            const y = document.getElementById('fYear').value;
            const s = document.getElementById('fSearch').value.toUpperCase();
            let total = 0;

            currentFilteredResults = db.logs.filter(l => {
                const d = new Date(l.date);
                const userAccess = (session.role === 'admin' || l.user === session.u);
                const monthMatch = (m === 'all' || d.getMonth().toString() === m);
                const yearMatch = (y === 'all' || d.getFullYear().toString() === y);
                const searchMatch = l.plate.includes(s);
                return userAccess && monthMatch && yearMatch && searchMatch;
            });

            document.getElementById('logTable').innerHTML = currentFilteredResults.map(l => {
                total += l.amt;
                return `
                <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                    <div>
                        <div class="text-[9px] font-black text-slate-400 uppercase">${new Date(l.date).toLocaleDateString()}</div>
                        <div class="font-black text-slate-900 tracking-tight">${l.plate}</div>
                        <div class="text-[9px] font-black text-emerald-600 uppercase">${l.route}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-black text-slate-900">${l.amt.toFixed(2)}L</div>
                        <button onclick="delLog('${l.id}')" class="admin-only text-red-400 text-[9px] font-black uppercase mt-1">Delete</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalDisplay').innerText = total.toFixed(2);
        };

        // ADMIN LISTS + FILTERS
        window.refreshAdminLists = () => {
            renderLogs();
            const cS = document.getElementById('vSearch').value.toUpperCase();
            const rS = document.getElementById('rSearch').value.toUpperCase();

            document.getElementById('list-cars').innerHTML = db.config.vehicles
                .filter(v => v.plate.includes(cS))
                .map(v => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border text-[11px] font-bold">
                    <span>${v.plate} <span class="text-slate-400 ml-2">${v.type}</span></span>
                    <button onclick="delV('${v.plate}')" class="text-red-500 font-bold px-2">×</button>
                </div>`).join('');

            document.getElementById('list-roads').innerHTML = db.config.routes
                .filter(r => r.toUpperCase().includes(rS))
                .map(r => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border text-[10px] font-black uppercase">
                    <span class="truncate">${r}</span>
                    <button onclick="delR('${r}')" class="text-red-500 text-lg">&times;</button>
                </div>`).join('');

            document.getElementById('list-users').innerHTML = db.users.map(u => `<div class="p-3 border rounded-xl text-xs font-bold bg-white">${u.u} (${u.role})</div>`).join('');
            document.getElementById('plateList').innerHTML = db.config.vehicles.map(v => `<option value="${v.plate}">${v.type}</option>`).join('');
            document.getElementById('iRoute').innerHTML = db.config.routes.map(r => `<option value="${r}">${r.toUpperCase()}</option>`).join('');
        };

        // DATA ACTIONS
        window.syncType = () => { const v = db.config.vehicles.find(x => x.plate === document.getElementById('iPlate').value.toUpperCase()); document.getElementById('iType').value = v ? v.type : ''; };
        
        document.getElementById('oilForm').onsubmit = async (e) => {
            e.preventDefault();
            const plate = document.getElementById('iPlate').value.toUpperCase();
            const v = db.config.vehicles.find(x => x.plate === plate);
            if(!v) return alert("Vehicle Plate Not Found In Fleet");
            await addDoc(collection(fs, "oil_logs"), { plate, type: v.type, route: document.getElementById('iRoute').value, amt: parseFloat(document.getElementById('iAmt').value), user: session.u, date: new Date(document.getElementById('iDate').value).toISOString() });
            document.getElementById('iAmt').value = ''; document.getElementById('iPlate').value = '';
        };

        window.exportCSV = () => {
            let csv = "Date,Plate,Type,Route,User,Liters\n";
            currentFilteredResults.forEach(l => csv += `${new Date(l.date).toLocaleDateString()},${l.plate},${l.type},${l.route},${l.user},${l.amt}\n`);
            const b = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `Report_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };

        // ADMIN ACTIONS
        window.addVehicle = async () => {
            const plate = document.getElementById('vPlate').value.toUpperCase();
            const type = document.getElementById('vTypeManual').value.toUpperCase();
            if(!plate || !type) return;
            db.config.vehicles.push({ plate, type });
            await setDoc(doc(fs, "settings", "config"), db.config);
            document.getElementById('vPlate').value = ''; document.getElementById('vTypeManual').value = '';
        };

        window.addRoute = async () => {
            const r = document.getElementById('rName').value.toUpperCase();
            if(!r) return;
            db.config.routes.push(r);
            await setDoc(doc(fs, "settings", "config"), db.config);
            document.getElementById('rName').value = '';
        };

        window.delV = async (p) => { if(confirm("Remove Vehicle?")) { db.config.vehicles = db.config.vehicles.filter(v => v.plate !== p); await setDoc(doc(fs, "settings", "config"), db.config); } };
        window.delR = async (r) => { if(confirm("Remove Route?")) { db.config.routes = db.config.routes.filter(x => x !== r); await setDoc(doc(fs, "settings", "config"), db.config); } };
        window.delLog = async (id) => { if(confirm("Delete Log?")) await deleteDoc(doc(fs, "oil_logs", id)); };
    </script>
</body>
</html>
