<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CL21 | Oil Control Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --primary: #10b981; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
        }

        /* High-End Aesthetics */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.5); }
        .neo-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05), 0 4px 10px -5px rgba(0,0,0,0.02); }
        
        /* Mobile Navigation Bar */
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: white; display: flex; border-top: 1px solid #f1f5f9; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { color: #10b981; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Smooth Elements */
        .tap-scale { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tap-scale:active { transform: scale(0.95); }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        /* Hidden Scrollbars */
        ::-webkit-scrollbar { display: none; }
        body { scroll-behavior: smooth; }
    </style>
</head>
<body class="antialiased pb-24 lg:pb-0">

    <div id="loginSection" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-950 p-6">
        <div class="bg-white p-10 rounded-[48px] w-full max-w-sm shadow-2xl animate__animated animate__fadeInUp">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-emerald-500 rounded-[28px] flex items-center justify-center text-white mx-auto mb-6 shadow-2xl shadow-emerald-500/20 rotate-3">
                    <i class="fa-solid fa-droplet text-3xl animate-pulse"></i>
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter">CL21 MASTER</h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">Enterprise Access</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div class="space-y-1">
                    <input type="text" id="uIn" placeholder="Username" class="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500 focus:bg-white transition-all">
                </div>
                <div class="space-y-1">
                    <input type="password" id="pIn" placeholder="Password" class="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500 focus:bg-white transition-all">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest tap-scale hover:bg-emerald-600">Initialize Terminal</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col lg:flex-row">
        
        <aside class="hidden lg:flex w-80 bg-white border-r flex-col p-8 h-screen sticky top-0">
            <div class="mb-12 flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <i class="fa-solid fa-gas-pump"></i>
                </div>
                <div>
                    <h2 class="font-black text-xl italic leading-none">CL21</h2>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">Control Center</p>
                </div>
            </div>

            <nav class="flex-1 space-y-3">
                <button onclick="nav('dash')" id="d-dash" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase transition-all bg-slate-900 text-white shadow-lg shadow-slate-200">
                    <i class="fa-solid fa-house-chimney"></i> Dashboard
                </button>
                <button onclick="nav('admin')" id="d-admin" class="admin-only w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase text-slate-400 hover:bg-slate-50 transition-all">
                    <i class="fa-solid fa-screwdriver-wrench"></i> Management
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t">
                <div class="flex items-center gap-3 px-4 mb-6">
                    <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 font-black text-xs" id="userInitial">A</div>
                    <span class="font-black text-xs uppercase text-slate-500" id="userName">User</span>
                </div>
                <button onclick="location.reload()" class="w-full py-4 text-red-500 font-black text-[10px] uppercase hover:bg-red-50 rounded-2xl">Log Out</button>
            </div>
        </aside>

        <nav class="lg:hidden mobile-nav">
            <button onclick="nav('dash')" id="m-dash" class="nav-item active"><i class="fa-solid fa-house"></i>Home</button>
            <button onclick="nav('admin')" id="m-admin" class="nav-item admin-only"><i class="fa-solid fa-sliders"></i>Admin</button>
            <button onclick="location.reload()" class="nav-item text-red-400"><i class="fa-solid fa-power-off"></i>Exit</button>
        </nav>

        <main class="flex-1 p-4 lg:p-12 max-w-6xl mx-auto w-full">
            
            <div id="view-dash" class="space-y-8 animate__animated animate__fadeIn">
                <div class="flex flex-col lg:flex-row justify-between lg:items-end gap-6">
                    <div class="w-full lg:w-auto p-8 rounded-[40px] bg-emerald-600 text-white shadow-2xl shadow-emerald-200 relative overflow-hidden">
                        <i class="fa-solid fa-chart-line absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                        <p class="text-[10px] font-black uppercase opacity-60 tracking-[0.2em] mb-1">Current Period Consumption</p>
                        <h2 class="text-5xl lg:text-7xl font-black tracking-tighter" id="totalDisplay">0.00</h2>
                        <span class="text-xs font-bold opacity-80">Liters Recorded</span>
                        
                        <div class="mt-6 flex gap-2">
                            <select id="fMonth" onchange="renderLogs()" class="bg-white/10 p-3 rounded-xl text-[10px] font-black uppercase outline-none"></select>
                            <select id="fYear" onchange="renderLogs()" class="bg-white/10 p-3 rounded-xl text-[10px] font-black uppercase outline-none"></select>
                        </div>
                    </div>
                    
                    <button onclick="exportData()" class="bg-white p-4 rounded-2xl flex items-center gap-4 neo-shadow border border-slate-100 tap-scale">
                        <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-file-csv"></i></div>
                        <div class="text-left pr-4">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Export Report</p>
                            <p class="text-xs font-black uppercase">Download CSV</p>
                        </div>
                    </button>
                </div>

                <div class="bg-white p-8 lg:p-10 rounded-[48px] neo-shadow border border-slate-100">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
                        <h3 class="font-black text-xs uppercase tracking-widest">Register Fuel Intake</h3>
                    </div>
                    <form id="oilForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Date</label>
                            <input type="date" id="iDate" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:bg-white border-2 border-transparent focus:border-emerald-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Plate Number</label>
                            <select id="iPlate" onchange="syncType()" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:bg-white border-2 border-transparent focus:border-emerald-500 transition-all"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Model</label>
                            <input type="text" id="iType" readonly class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-slate-400 border-none outline-none" placeholder="...">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Route</label>
                            <select id="iRoute" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:bg-white border-2 border-transparent focus:border-emerald-500 transition-all"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Liters (L)</label>
                            <input type="number" id="iAmt" step="0.01" required placeholder="0.00" class="w-full p-4 bg-emerald-50 rounded-2xl font-black text-emerald-700 outline-none border-2 border-transparent focus:border-emerald-500 transition-all">
                        </div>
                        <button type="submit" class="lg:col-span-5 bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest tap-scale hover:bg-emerald-600 shadow-lg">Submit Record</button>
                    </form>
                </div>

                <div class="space-y-4">
                    <h4 class="font-black text-xs uppercase tracking-widest text-slate-400 ml-4">Activity Logbook</h4>
                    <div id="logContainer" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>

            <div id="view-admin" class="hidden space-y-8 animate__animated animate__fadeIn">
                <div class="flex bg-white p-2 rounded-[28px] neo-shadow lg:w-fit">
                    <button onclick="tab('users')" id="t-users" class="admin-tab-btn active px-8 py-4 rounded-2xl font-black text-[10px] uppercase">Staff Accounts</button>
                    <button onclick="tab('cars')" id="t-cars" class="admin-tab-btn px-8 py-4 rounded-2xl font-black text-[10px] uppercase">Vehicle Assets</button>
                    <button onclick="tab('roads')" id="t-roads" class="admin-tab-btn px-8 py-4 rounded-2xl font-black text-[10px] uppercase">Routes</button>
                </div>

                <div id="sec-users" class="space-y-6">
                    <form id="uForm" class="grid grid-cols-1 md:flex gap-4 p-8 bg-white rounded-[32px] neo-shadow border border-slate-100">
                        <input type="text" id="uName" placeholder="Staff Name" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold outline-none" required>
                        <input type="password" id="uPass" placeholder="Password" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold outline-none" required>
                        <button type="submit" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tap-scale">Create Account</button>
                    </form>
                    <div id="list-users" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="sec-cars" class="hidden space-y-6">
                    <div class="grid grid-cols-1 md:flex gap-4 p-8 bg-white rounded-[32px] neo-shadow border border-slate-100">
                        <input type="text" id="vPlate" placeholder="Plate #" class="flex-1 p-4 bg-slate-50 rounded-2xl font-black uppercase outline-none">
                        <input type="text" id="vTypeManual" placeholder="Model (e.g. Ford, Toyota)" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <button onclick="addVehicle()" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tap-scale">Add Asset</button>
                    </div>
                    <div id="list-cars" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="sec-roads" class="hidden space-y-6">
                    <div class="flex gap-4 p-8 bg-white rounded-[32px] neo-shadow border border-slate-100">
                        <input type="text" id="rName" placeholder="New Route Name" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <button onclick="addRoute()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xl tap-scale">+</button>
                    </div>
                    <div id="list-roads" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Database Setup
        const db = {
            users: JSON.parse(localStorage.getItem('cl21_users')) || [{ u: 'admin', p: 'cambo@123', role: 'admin' }],
            config: JSON.parse(localStorage.getItem('cl21_cfg')) || { vehicles: [], routes: ['Phnom Penh'] },
            logs: JSON.parse(localStorage.getItem('cl21_logs')) || []
        };
        let session = null;

        // Navigation Logic
        function nav(v) {
            document.getElementById('view-dash').classList.toggle('hidden', v !== 'dash');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
            
            // UI States
            ['d-dash', 'd-admin', 'm-dash', 'm-admin'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    const isActive = id.includes(v);
                    if(id.startsWith('d-')) {
                        el.className = isActive ? "w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase bg-slate-900 text-white shadow-lg" : "w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase text-slate-400 hover:bg-slate-50";
                    } else {
                        el.classList.toggle('active', isActive);
                    }
                }
            });
        }

        function tab(t) {
            ['users', 'cars', 'roads'].forEach(x => {
                document.getElementById(`sec-${x}`).classList.toggle('hidden', x !== t);
                document.getElementById(`t-${x}`).className = x === t ? "admin-tab-btn active px-8 py-4 rounded-2xl font-black text-[10px] uppercase bg-slate-900 text-white shadow-lg" : "admin-tab-btn px-8 py-4 rounded-2xl font-black text-[10px] uppercase text-slate-400";
            });
        }

        // Login Logic
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = db.users.find(x => x.u === document.getElementById('uIn').value && x.p === document.getElementById('pIn').value);
            if(user) {
                session = user;
                if(user.role === 'admin') document.body.classList.add('is-admin');
                document.getElementById('loginSection').classList.add('animate__animated', 'animate__fadeOutDown');
                setTimeout(() => {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('app').classList.replace('hidden', 'flex');
                    document.getElementById('userName').innerText = user.u;
                    document.getElementById('userInitial').innerText = user.u[0].toUpperCase();
                    initTerminal();
                }, 500);
            } else alert("Access Denied");
        };

        function initTerminal() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('fMonth').innerHTML = '<option value="all">Full Year</option>' + months.map((m, i) => `<option value="${i}">${m.toUpperCase()}</option>`).join('');
            let ys = ''; for(let y=2026; y<=2030; y++) ys += `<option value="${y}">${y}</option>`;
            document.getElementById('fYear').innerHTML = ys;
            document.getElementById('fMonth').value = new Date().getMonth();
            document.getElementById('fYear').value = new Date().getFullYear();
            document.getElementById('iDate').valueAsDate = new Date();
            refreshUI();
        }

        // Action Handlers
        window.addVehicle = () => {
            const p = document.getElementById('vPlate').value.trim();
            const t = document.getElementById('vTypeManual').value.trim();
            if(!p || !t) return;
            db.config.vehicles.push({ plate: p.toUpperCase(), type: t.toUpperCase() });
            saveCfg(); document.getElementById('vPlate').value = ''; document.getElementById('vTypeManual').value = '';
        };

        window.addRoute = () => {
            const r = document.getElementById('rName').value.trim();
            if(!r) return;
            db.config.routes.push(r);
            saveCfg(); document.getElementById('rName').value = '';
        };

        document.getElementById('uForm').onsubmit = (e) => {
            e.preventDefault();
            db.users.push({ u: document.getElementById('uName').value, p: document.getElementById('uPass').value, role: 'operator' });
            localStorage.setItem('cl21_users', JSON.stringify(db.users));
            e.target.reset(); refreshUI();
        };

        function saveCfg() { localStorage.setItem('cl21_cfg', JSON.stringify(db.config)); refreshUI(); }

        window.syncType = () => {
            const match = db.config.vehicles.find(v => v.plate === document.getElementById('iPlate').value);
            document.getElementById('iType').value = match ? match.type : '';
        };

        document.getElementById('oilForm').onsubmit = (e) => {
            e.preventDefault();
            const plate = document.getElementById('iPlate').value;
            const type = db.config.vehicles.find(v => v.plate === plate).type;
            db.logs.unshift({ id: Date.now(), plate, type, route: document.getElementById('iRoute').value, amt: parseFloat(document.getElementById('iAmt').value), user: session.u, date: new Date(document.getElementById('iDate').value).toISOString() });
            localStorage.setItem('cl21_logs', JSON.stringify(db.logs));
            document.getElementById('iAmt').value = ''; renderLogs();
        };

        function renderLogs() {
            const m = document.getElementById('fMonth').value;
            const y = document.getElementById('fYear').value;
            let total = 0;
            const filtered = db.logs.filter(l => {
                const d = new Date(l.date);
                const uM = (session.role === 'admin' || l.user === session.u);
                const mM = (m === 'all' || d.getMonth().toString() === m);
                const yM = (y === 'all' || d.getFullYear().toString() === y);
                return uM && mM && yM;
            });

            document.getElementById('logContainer').innerHTML = filtered.map((l, i) => {
                total += l.amt; const d = new Date(l.date);
                return `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center neo-shadow animate__animated animate__fadeInUp" style="animation-delay: ${i*0.05}s">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400"><i class="fa-solid fa-truck-moving"></i></div>
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase">${d.toLocaleDateString()}</p>
                            <h4 class="font-black text-slate-900">${l.plate}</h4>
                            <p class="text-[10px] font-bold text-emerald-500 uppercase">${l.type} • ${l.route}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-slate-900 tracking-tighter">${l.amt.toFixed(2)}L</p>
                        <div class="admin-only">
                            <button onclick="delLog(${l.id})" class="text-[9px] font-black text-red-300 uppercase mt-1 tracking-widest">Delete Record</button>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<div class="p-20 text-center font-black text-slate-200 uppercase tracking-widest">Database Empty</div>';
            
            document.getElementById('totalDisplay').innerText = total.toFixed(2);
        }

        window.delLog = (id) => { if(confirm("Erase entry?")){ db.logs = db.logs.filter(x => x.id !== id); localStorage.setItem('cl21_logs', JSON.stringify(db.logs)); renderLogs(); }};

        function refreshUI() {
            renderLogs();
            document.getElementById('list-users').innerHTML = db.users.map((u, i) => `<div class="p-5 bg-white rounded-2xl flex justify-between items-center font-bold text-[10px] uppercase shadow-sm border border-slate-50">${u.u} <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-400">${u.role}</span> ${u.u !== 'admin' ? `<button onclick="db.users.splice(${i},1); refreshUI()" class="text-red-400">DEL</button>` : ''}</div>`).join('');
            document.getElementById('list-cars').innerHTML = db.config.vehicles.map((v, i) => `<div class="p-5 bg-white rounded-2xl flex justify-between items-center font-black text-xs uppercase shadow-sm border border-slate-50"><span>${v.plate} <span class="text-emerald-500 font-bold ml-2">(${v.type})</span></span> <button onclick="db.config.vehicles.splice(${i},1); saveCfg()" class="text-red-400">REMOVE</button></div>`).join('');
            document.getElementById('list-roads').innerHTML = db.config.routes.map((r, i) => `<div class="p-4 bg-white rounded-2xl flex justify-between items-center text-[10px] font-black uppercase shadow-sm border border-slate-50">${r} <button onclick="db.config.routes.splice(${i},1); saveCfg()" class="text-red-400 text-lg">×</button></div>`).join('');
            document.getElementById('iPlate').innerHTML = '<option value="">Asset Plate</option>' + db.config.vehicles.map(v => `<option value="${v.plate}">${v.plate}</option>`).join('');
            document.getElementById('iRoute').innerHTML = db.config.routes.map(r => `<option>${r}</option>`).join('');
            syncType();
        }

        window.exportData = () => {
            let csv = "Date,Plate,Type,Route,Staff,Liters\n";
            db.logs.forEach(l => csv += `${new Date(l.date).toLocaleDateString()},${l.plate},${l.type},${l.route},${l.user},${l.amt}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'CL21_Report.csv'; a.click();
        };
    </script>
</body>
</html>
