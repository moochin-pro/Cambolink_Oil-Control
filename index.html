<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CL21 | Clean Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        .m-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; height: 70px; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .m-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #94a3b8; border: none; background: transparent; transition: all 0.2s; }
        .m-nav-btn.active { color: #059669; }

        input, select { border: 1px solid #e2e8f0 !important; transition: border-color 0.2s; }
        input:focus { border-color: #059669 !important; }
        
        .search-input { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%2394a3b8"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>'); background-repeat: no-repeat; background-position: 12px center; background-size: 16px; padding-left: 40px !important; }
    </style>
</head>
<body class="pb-24 lg:pb-0">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl shadow-sm border border-emerald-100">
                <i class="fa-solid fa-oil-can"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">CL21_OIL</h1>
            <p class="text-[10px] text-slate-400 mb-8 font-bold uppercase tracking-[0.2em]">Inventory Access</p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-4 rounded-2xl outline-none bg-slate-50 font-bold text-center text-sm" required>
                <input type="password" id="pIn" placeholder="Password" class="w-full p-4 rounded-2xl outline-none bg-slate-50 font-bold text-center text-sm" required>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-emerald-200 transition-all active:scale-95">Verify Account</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden flex flex-col lg:flex-row min-h-screen">
        
        <aside class="hidden lg:flex w-72 bg-white border-r flex-col p-8 sticky top-0 h-screen">
            <div class="font-black text-2xl mb-12 tracking-tighter text-emerald-600 flex items-center gap-3">
                <div class="p-2 bg-emerald-600 text-white rounded-lg"><i class="fa-solid fa-droplet text-sm"></i></div> CL21_OIL
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="nav('dash')" id="d-dash" class="w-full text-left px-5 py-4 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-700 shadow-sm shadow-emerald-100"><i class="fa-solid fa-grid-2 mr-4"></i>Data Logs</button>
                <button onclick="nav('admin')" id="d-admin" class="admin-only w-full text-left px-5 py-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50 transition-all"><i class="fa-solid fa-user-shield mr-4"></i>Management</button>
            </nav>
            <button onclick="location.reload()" class="text-red-500 text-xs font-black text-left px-5 py-4 hover:bg-red-50 rounded-2xl flex items-center transition-all"><i class="fa-solid fa-power-off mr-4"></i>LOGOUT</button>
        </aside>

        <nav class="lg:hidden m-nav">
            <button onclick="nav('dash')" id="m-dash" class="m-nav-btn active"><i class="fa-solid fa-table-list mb-1.5 text-xl"></i>DATA</button>
            <button onclick="nav('admin')" id="m-admin" class="m-nav-btn admin-only"><i class="fa-solid fa-sliders mb-1.5 text-xl"></i>ADMIN</button>
            <button onclick="location.reload()" class="m-nav-btn text-red-400"><i class="fa-solid fa-arrow-right-from-bracket mb-1.5 text-xl"></i>EXIT</button>
        </nav>

        <main class="flex-1 p-4 lg:p-12 bg-[#f8fafc]">
            
            <div id="view-dash" class="max-w-5xl mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-emerald-600 p-8 rounded-[2rem] shadow-xl shadow-emerald-100 relative overflow-hidden">
                        <i class="fa-solid fa-gas-pump absolute -right-4 -bottom-4 text-emerald-500 text-9xl opacity-20 rotate-12"></i>
                        <p class="text-emerald-100 text-[10px] font-black uppercase tracking-widest mb-2">Total Consumption</p>
                        <h2 class="text-5xl font-black text-white tracking-tight" id="totalDisplay">0.00</h2>
                        <div class="mt-4 inline-flex items-center gap-2 bg-emerald-500/30 px-3 py-1 rounded-full text-[10px] font-bold text-white uppercase tracking-tighter">
                            <span id="currentFilterLabel">Current Filters Applied</span>
                        </div>
                    </div>
                    
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col justify-between space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Advanced Search</h3>
                            <button onclick="exportFilteredCSV()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 transition-all"><i class="fa-solid fa-file-csv mr-2"></i>Export Filtered</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="fMonth" onchange="renderLogs()" class="p-3 rounded-xl border text-xs font-bold bg-slate-50 outline-none"></select>
                            <select id="fYear" onchange="renderLogs()" class="p-3 rounded-xl border text-xs font-bold bg-slate-50 outline-none"></select>
                        </div>
                        <input type="text" id="fSearch" oninput="renderLogs()" placeholder="Search Plate Number..." class="search-input w-full p-4 rounded-xl border text-sm font-bold uppercase outline-none shadow-sm">
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-3"><i class="fa-solid fa-circle-plus text-emerald-500"></i> Register New Fuel Log</h3>
                    <form id="oilForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Date</label>
                            <input type="date" id="iDate" required class="w-full p-4 bg-slate-50 rounded-2xl border text-sm font-bold outline-none">
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Plate Number</label>
                            <input list="plateList" id="iPlate" placeholder="FIND PLATE..." onchange="syncType()" required class="search-input w-full p-4 bg-white rounded-2xl border text-sm font-black uppercase outline-none">
                            <datalist id="plateList"></datalist>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Vehicle Type</label>
                            <input type="text" id="iType" readonly class="w-full p-4 bg-slate-100 rounded-2xl border text-sm font-bold text-slate-400 uppercase" placeholder="---">
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Route</label>
                            <select id="iRoute" required class="w-full p-4 bg-slate-50 rounded-2xl border text-sm font-bold outline-none uppercase"></select>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Liters (L)</label>
                            <input type="number" id="iAmt" step="0.01" required placeholder="0.00" class="w-full p-4 bg-emerald-50 rounded-2xl border border-emerald-100 text-sm font-black text-emerald-700 outline-none">
                        </div>
                        
                        <button type="submit" class="lg:col-span-5 bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-emerald-600 transition-all active:scale-95 shadow-lg">Commit To System</button>
                    </form>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-[0.1em]">
                                <tr>
                                    <th class="px-8 py-5">History Date</th>
                                    <th class="px-8 py-5">Vehicle Detail</th>
                                    <th class="px-8 py-5">Assigned Route</th>
                                    <th class="px-8 py-5 text-right">Qty (Liters)</th>
                                    <th class="px-8 py-5 text-right admin-only">Action</th>
                                </tr>
                            </thead>
                            <tbody id="logTable" class="divide-y divide-slate-100 text-slate-600"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-admin" class="hidden max-w-4xl mx-auto space-y-8">
                <div class="flex gap-3 p-1.5 bg-white rounded-2xl border w-fit shadow-sm">
                    <button onclick="tab('users')" id="t-users" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white shadow-lg shadow-emerald-100 transition-all">Users</button>
                    <button onclick="tab('cars')" id="t-cars" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400 hover:text-slate-600 transition-all">Fleet</button>
                    <button onclick="tab('roads')" id="t-roads" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400 hover:text-slate-600 transition-all">Routes</button>
                </div>

                <div id="sec-users" class="space-y-4">
                    <form id="uForm" class="bg-white p-6 rounded-3xl border flex gap-3 shadow-sm">
                        <input type="text" id="uName" placeholder="New ID" class="flex-1 p-4 rounded-2xl border text-sm font-bold outline-none" required>
                        <input type="password" id="uPass" placeholder="Secret Key" class="flex-1 p-4 rounded-2xl border text-sm font-bold outline-none" required>
                        <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-[10px] uppercase">Create</button>
                    </form>
                    <div id="list-users" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>

                <div id="sec-cars" class="hidden space-y-4">
                    <div class="bg-white p-8 rounded-3xl border space-y-4 shadow-sm">
                        <h4 class="text-xs font-black uppercase text-slate-400">Add Vehicle To Fleet</h4>
                        <div class="flex flex-col md:flex-row gap-3">
                            <input type="text" id="vPlate" placeholder="PLATE #" class="flex-1 p-4 rounded-2xl border text-sm font-black uppercase outline-none bg-slate-50">
                            <input type="text" id="vTypeManual" placeholder="VEHICLE TYPE" class="flex-1 p-4 rounded-2xl border text-sm font-bold outline-none bg-slate-50">
                            <button onclick="addVehicle()" class="bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-100">Register</button>
                        </div>
                    </div>
                    <div class="relative">
                        <input type="text" id="vSearch" oninput="refreshAdminLists()" placeholder="SEARCH FLEET BY PLATE..." class="search-input w-full p-5 bg-white rounded-3xl border text-sm font-black uppercase outline-none shadow-sm">
                    </div>
                    <div id="list-cars" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>

                <div id="sec-roads" class="hidden space-y-4">
                    <div class="bg-white p-8 rounded-3xl border flex gap-3 shadow-sm">
                        <input type="text" id="rName" placeholder="NEW ROUTE NAME" class="flex-1 p-4 rounded-2xl border text-sm font-black outline-none bg-slate-50 uppercase">
                        <button onclick="addRoute()" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xl">+</button>
                    </div>
                    <input type="text" id="rSearch" oninput="refreshAdminLists()" placeholder="FILTER ROUTES..." class="search-input w-full p-5 bg-white rounded-3xl border text-sm font-black uppercase outline-none shadow-sm">
                    <div id="list-roads" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDITjn7k_fWas0YJgOYh5daG3YARqWe9n0",
            authDomain: "cl21-oil-system.firebaseapp.com",
            projectId: "cl21-oil-system",
            storageBucket: "cl21-oil-system.firebasestorage.app",
            messagingSenderId: "482675024663",
            appId: "1:482675024663:web:036e7296a4fd0fd539cd52"
        };

        const app = initializeApp(firebaseConfig);
        const firestore = getFirestore(app);

        let session = null;
        let activeFilteredLogs = [];
        let db = { users: [], config: { vehicles: [], routes: [] }, logs: [] };

        // SYNC HANDLERS
        onSnapshot(collection(firestore, "users"), (snap) => {
            db.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (db.users.length === 0) setDoc(doc(firestore, "users", "root"), { u: 'admin', p: 'cambo@123', role: 'admin' });
            refreshAdminLists();
        });

        onSnapshot(doc(firestore, "settings", "config"), (snap) => {
            if (snap.exists()) { db.config = snap.data(); refreshAdminLists(); }
            else { setDoc(doc(firestore, "settings", "config"), { vehicles: [], routes: ['Phnom Penh'] }); }
        });

        const logQ = query(collection(firestore, "oil_logs"), orderBy("date", "desc"));
        onSnapshot(logQ, (snap) => {
            db.logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLogs();
        });

        // CORE UI LOGIC
        window.nav = (v) => {
            document.getElementById('view-dash').classList.toggle('hidden', v !== 'dash');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
            document.getElementById('d-dash').className = (v==='dash') ? "w-full text-left px-5 py-4 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-700 shadow-sm shadow-emerald-100" : "w-full text-left px-5 py-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50 transition-all";
            document.getElementById('d-admin').className = (v==='admin') ? "admin-only w-full text-left px-5 py-4 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-700 shadow-sm shadow-emerald-100" : "admin-only w-full text-left px-5 py-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50 transition-all";
            document.getElementById('m-dash').classList.toggle('active', v === 'dash');
            document.getElementById('m-admin').classList.toggle('active', v === 'admin');
        }

        window.tab = (t) => {
            ['users', 'cars', 'roads'].forEach(x => {
                document.getElementById(`sec-${x}`).classList.toggle('hidden', x !== t);
                document.getElementById(`t-${x}`).className = (x===t) ? "px-8 py-3 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white shadow-lg" : "px-8 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400 hover:text-slate-600";
            });
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = db.users.find(x => x.u === document.getElementById('uIn').value && x.p === document.getElementById('pIn').value);
            if(user) {
                session = user;
                if(user.role === 'admin') document.body.classList.add('is-admin');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                setupSystem();
            } else alert("INVALID ACCESS KEY");
        };

        function setupSystem() {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('fMonth').innerHTML = '<option value="all">ANY MONTH</option>' + months.map((m, i) => `<option value="${i}">${m.toUpperCase()}</option>`).join('');
            let ys = '<option value="all">ANY YEAR</option>'; for(let y=2026; y<=2030; y++) ys += `<option value="${y}">${y}</option>`;
            document.getElementById('fYear').innerHTML = ys;
            document.getElementById('fMonth').value = new Date().getMonth();
            document.getElementById('fYear').value = new Date().getFullYear();
            document.getElementById('iDate').valueAsDate = new Date();
            refreshAdminLists();
        }

        // FILTERED LOG RENDERING
        window.renderLogs = () => {
            const m = document.getElementById('fMonth').value;
            const y = document.getElementById('fYear').value;
            const s = document.getElementById('fSearch').value.toUpperCase();
            let total = 0;

            activeFilteredLogs = db.logs.filter(l => {
                const d = new Date(l.date);
                const userMatch = (session.role === 'admin' || l.user === session.u);
                const monthMatch = (m === 'all' || d.getMonth().toString() === m);
                const yearMatch = (y === 'all' || d.getFullYear().toString() === y);
                const searchMatch = l.plate.toUpperCase().includes(s);
                return userMatch && monthMatch && yearMatch && searchMatch;
            });

            document.getElementById('logTable').innerHTML = activeFilteredLogs.map(l => {
                total += l.amt;
                return `<tr>
                    <td class="px-8 py-6">
                        <div class="text-[10px] font-black text-slate-400 uppercase mb-0.5">${new Date(l.date).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</div>
                        <div class="text-xs font-bold text-slate-800 tracking-tighter">${new Date(l.date).getFullYear()}</div>
                    </td>
                    <td class="px-8 py-6">
                        <div class="font-black text-slate-900 uppercase tracking-wider">${l.plate}</div>
                        <div class="text-[9px] font-bold text-emerald-500 uppercase">${l.type}</div>
                    </td>
                    <td class="px-8 py-6 text-xs font-bold text-slate-500 uppercase">${l.route}</td>
                    <td class="px-8 py-6 text-right font-black text-slate-900 text-lg">${l.amt.toFixed(2)}<span class="text-[10px] text-slate-400 ml-1">L</span></td>
                    <td class="px-8 py-6 text-right admin-only">
                        <button onclick="delEntry('${l.id}')" class="p-2 text-red-200 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="py-24 text-center text-slate-300 font-bold uppercase tracking-widest italic text-xs">Zero records found</td></tr>';

            document.getElementById('totalDisplay').innerText = total.toFixed(2) + " L";
        }

        // EXPORT FILTERED CSV (NEW FIX)
        window.exportFilteredCSV = () => {
            if(activeFilteredLogs.length === 0) return alert("No data found to export with current filters.");
            
            let csv = "Date,Plate,Type,Route,User,Liters\n";
            activeFilteredLogs.forEach(l => {
                csv += `${new Date(l.date).toLocaleDateString()},${l.plate},${l.type},${l.route},${l.user},${l.amt}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0,10);
            a.href = url;
            a.download = `CL21_Report_${timestamp}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // ADMIN CRUD
        window.addVehicle = async () => {
            const p = document.getElementById('vPlate').value.trim().toUpperCase();
            const t = document.getElementById('vTypeManual').value.trim().toUpperCase();
            if(!p || !t) return;
            db.config.vehicles.push({ plate: p, type: t });
            await setDoc(doc(firestore, "settings", "config"), db.config);
            document.getElementById('vPlate').value = ''; document.getElementById('vTypeManual').value = '';
        };

        window.addRoute = async () => {
            const r = document.getElementById('rName').value.trim().toUpperCase();
            if(!r) return;
            db.config.routes.push(r);
            await setDoc(doc(firestore, "settings", "config"), db.config);
            document.getElementById('rName').value = '';
        };

        window.delVehicle = async (plate) => {
            if(confirm(`Erase ${plate} from fleet?`)) {
                db.config.vehicles = db.config.vehicles.filter(v => v.plate !== plate);
                await setDoc(doc(firestore, "settings", "config"), db.config);
            }
        };

        window.delRoute = async (name) => {
            if(confirm(`Erase route ${name}?`)) {
                db.config.routes = db.config.routes.filter(r => r !== name);
                await setDoc(doc(firestore, "settings", "config"), db.config);
            }
        };

        // ADMIN SEARCH FIX
        function refreshAdminLists() {
            renderLogs();
            const cS = document.getElementById('vSearch')?.value.toUpperCase() || "";
            const rS = document.getElementById('rSearch')?.value.toUpperCase() || "";

            document.getElementById('list-users').innerHTML = db.users.map(u => `
                <div class="p-5 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div><div class="text-[9px] font-black text-emerald-500 uppercase">${u.role}</div><div class="font-bold text-slate-800">${u.u}</div></div>
                    ${u.u !== 'admin' ? `<button onclick="delUser('${u.id}')" class="text-red-400 font-black text-[9px] hover:bg-red-50 p-2 px-3 rounded-lg">DELETE</button>` : ''}
                </div>`).join('');

            document.getElementById('list-cars').innerHTML = db.config.vehicles
                .filter(v => v.plate.includes(cS))
                .map(v => `
                <div class="p-5 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div><div class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">${v.type}</div><div class="font-black text-slate-900 tracking-wider">${v.plate}</div></div>
                    <button onclick="delVehicle('${v.plate}')" class="text-red-300 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join('') || '<div class="col-span-2 text-center text-slate-400 py-10 font-bold uppercase text-[10px] italic">No matching vehicles</div>';

            document.getElementById('list-roads').innerHTML = db.config.routes
                .filter(r => r.includes(rS))
                .map(r => `
                <div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm text-xs font-black uppercase">
                    <span class="truncate pr-2">${r}</span>
                    <button onclick="delRoute('${r}')" class="text-red-200 hover:text-red-500 text-2xl font-light">&times;</button>
                </div>`).join('') || '<div class="col-span-4 text-center text-slate-400 py-10 font-bold uppercase text-[10px] italic">No routes found</div>';

            document.getElementById('plateList').innerHTML = db.config.vehicles.map(v => `<option value="${v.plate}">${v.type}</option>`).join('');
            document.getElementById('iRoute').innerHTML = db.config.routes.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        // ADD RECORD SUBMIT
        document.getElementById('oilForm').onsubmit = async (e) => {
            e.preventDefault();
            const plateVal = document.getElementById('iPlate').value.toUpperCase();
            const found = db.config.vehicles.find(v => v.plate === plateVal);
            if(!found) return alert("UNREGISTERED VEHICLE: Add it in Admin first.");

            await addDoc(collection(firestore, "oil_logs"), {
                plate: plateVal,
                type: found.type,
                route: document.getElementById('iRoute').value,
                amt: parseFloat(document.getElementById('iAmt').value),
                user: session.u,
                date: new Date(document.getElementById('iDate').value).toISOString()
            });
            document.getElementById('iAmt').value = '';
            document.getElementById('iPlate').value = '';
            document.getElementById('iType').value = '---';
        };

        window.delEntry = async (id) => { if(confirm("Permanently erase record?")) await deleteDoc(doc(firestore, "oil_logs", id)); };
        window.syncType = () => { const v = db.config.vehicles.find(x => x.plate === document.getElementById('iPlate').value.toUpperCase()); document.getElementById('iType').value = v ? v.type : '---'; };

        document.getElementById('uForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(firestore, "users"), { u: document.getElementById('uName').value, p: document.getElementById('uPass').value, role: 'staff' });
            document.getElementById('uName').value = ''; document.getElementById('uPass').value = '';
        };

        window.delUser = async (id) => { if(confirm("Erase staff access?")) await deleteDoc(doc(firestore, "users", id)); };
    </script>
</body>
</html>
