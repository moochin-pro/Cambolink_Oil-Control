<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cambolink21_Express | Oil Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #1e293b; 
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }

        /* Smooth Scrolling Table */
        .table-container { 
            height: calc(100vh - 460px); 
            min-height: 350px; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: #e2e8f0 transparent;
        }
        
        .table-container::-webkit-scrollbar { width: 5px; }
        .table-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Animations */
        .hover-scale { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-scale:hover { transform: scale(1.02); }
        .hover-scale:active { transform: scale(0.98); }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        .m-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; display: flex; height: 70px; z-index: 50; }
        .m-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #94a3b8; transition: 0.3s; }
        .m-nav-btn.active { color: var(--primary); }

        .plate-results { 
            position: absolute; top: calc(100% + 5px); left: 0; right: 0; 
            background: white; border-radius: 12px; z-index: 100; 
            max-height: 220px; overflow-y: auto; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
            animation: fadeInDown 0.2s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        tr { transition: background 0.2s; }
        tr:hover { background: #f8fafc; }

        /* Custom Input Styling */
        input, select {
            transition: all 0.2s;
            border: 1.5px solid #f1f5f9 !important;
        }
        input:focus, select:focus {
            border-color: var(--primary) !important;
            background: white !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body class="pb-24 lg:pb-0">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#10b981 1px, transparent 1px); background-size: 20px 20px;"></div>
        <div class="bg-white p-10 rounded-[2rem] w-full max-w-sm shadow-2xl relative animate__animated animate__zoomIn">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-droplet text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-1 text-slate-900 tracking-tight">Cambolink_Oil_System</h1>
            <p class="text-sm text-slate-400 mb-8 font-medium">Fuel Management</p>
            <form id="loginForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Identity</label>
                    <input type="text" id="uIn" placeholder="Username" class="w-full p-4 rounded-xl outline-none bg-slate-50 font-semibold" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Security Key</label>
                    <input type="password" id="pIn" placeholder="••••••••" class="w-full p-4 rounded-xl outline-none bg-slate-50 font-semibold" required>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all shadow-lg shadow-emerald-100 mt-4 active:scale-95">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden flex flex-col lg:flex-row h-screen overflow-hidden">
        <aside class="hidden lg:flex w-72 bg-white border-r border-slate-100 flex-col p-8 h-full">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-100">
                    <i class="fa-solid fa-droplet text-white"></i>
                </div>
                <span class="font-extrabold text-2xl tracking-tighter">Cambolink_Fuel<span class="text-emerald-500">_</span></span>
            </div>
            
            <nav class="flex-1 space-y-2">
                <button onclick="nav('dash')" id="d-dash" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-700 transition-all">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </button>
                <button onclick="nav('admin')" id="d-admin" class="admin-only w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fa-solid fa-shield-halved"></i> Control Panel
                </button>
            </nav>

            <div class="pt-6 border-t border-slate-50">
                <button onclick="location.reload()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm text-red-400 hover:bg-red-50 transition-all">
                    <i class="fa-solid fa-power-off"></i> Logout
                </button>
            </div>
        </aside>

        <nav class="lg:hidden m-nav px-4">
            <button onclick="nav('dash')" id="m-dash" class="m-nav-btn active"><i class="fa-solid fa-house-chimney mb-1 text-xl"></i>Home</button>
            <button onclick="nav('admin')" id="m-admin" class="m-nav-btn admin-only"><i class="fa-solid fa-sliders mb-1 text-xl"></i>Setup</button>
            <button onclick="location.reload()" class="m-nav-btn text-red-300"><i class="fa-solid fa-door-open mb-1 text-xl"></i>Exit</button>
        </nav>

        <main class="flex-1 p-4 lg:p-8 overflow-hidden flex flex-col">
            <div id="view-dash" class="max-w-7xl mx-auto w-full flex flex-col h-full space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 shrink-0">
                    <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden group">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <p class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Fuel Consumption</p>
                        <div class="flex items-baseline gap-2">
                            <h2 class="text-4xl font-black text-slate-900" id="totalDisplay">0.00</h2>
                            <span class="text-slate-400 font-bold">Liters</span>
                        </div>
                    </div>

                    <div class="glass-card p-6 rounded-[2rem] md:col-span-2 flex flex-col md:flex-row items-center gap-6">
                        <div class="w-full md:w-1/2 space-y-3">
                            <div class="flex justify-between items-end">
                                <p class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Active Filters</p>
                                <button onclick="exportData()" class="text-emerald-600 font-bold text-xs hover:underline"><i class="fa-solid fa-file-export mr-1"></i>Export CSV</button>
                            </div>
                            <div class="flex gap-2">
                                <input type="date" id="fStart" onchange="renderLogs()" class="flex-1 p-3 rounded-xl bg-white text-xs font-bold">
                                <input type="date" id="fEnd" onchange="renderLogs()" class="flex-1 p-3 rounded-xl bg-white text-xs font-bold">
                            </div>
                        </div>
                        <div class="w-full md:w-1/2 relative">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                            <input type="text" id="fSearch" oninput="renderLogs()" placeholder="Search Plate Number..." class="w-full pl-11 p-4 rounded-2xl bg-white text-sm font-bold uppercase placeholder:text-slate-300">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-2 rounded-[2.5rem] shrink-0 border-2 border-emerald-500/5">
                    <div class="p-6">
                        <h3 class="text-xs font-black uppercase text-slate-400 tracking-[0.2em] mb-5 flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> New Log Entry
                        </h3>
                        <form id="oilForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-4 items-end">
                            <div class="lg:col-span-2 space-y-1">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Log Date</label>
                                <input type="date" id="iDate" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold">
                            </div>
                            <div class="lg:col-span-3 space-y-1 relative group">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Vehicle Plate</label>
                                <input type="text" id="iPlate" autocomplete="off" oninput="searchPlate(this.value)" placeholder="Search..." required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-black uppercase placeholder:normal-case">
                                <div id="plateDropdown" class="plate-results hidden"></div>
                            </div>
                            <div class="lg:col-span-2 space-y-1">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Class</label>
                                <input type="text" id="iType" readonly class="w-full p-4 bg-slate-100 rounded-2xl text-sm font-bold text-slate-400" placeholder="Model">
                            </div>
                            <div class="lg:col-span-2 space-y-1">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Assigned Route</label>
                                <select id="iRoute" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold"></select>
                            </div>
                            <div class="lg:col-span-2 space-y-1">
                                <label class="text-[9px] font-black text-emerald-600 uppercase ml-1">Liters (L)</label>
                                <input type="number" id="iAmt" step="0.01" required placeholder="0.00" class="w-full p-4 bg-emerald-50 rounded-2xl text-sm font-black text-emerald-700">
                            </div>
                            <div class="lg:col-span-1">
                                <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-2xl hover-scale flex items-center justify-center">
                                    <i class="fa-solid fa-plus text-xl"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="glass-card rounded-[2.5rem] flex-1 flex flex-col overflow-hidden border border-slate-100">
                    <div class="table-container">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead>
                                <tr class="border-none">
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Timeline</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Plate Identity</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Configuration</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest admin-only">Logged By</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Fuel Volume</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right admin-only">Manage</th>
                                </tr>
                            </thead>
                            <tbody id="logTable" class="text-slate-600"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-admin" class="hidden max-w-5xl mx-auto w-full overflow-y-auto h-full space-y-8 pb-32 animate__animated animate__fadeIn">
                <div class="flex items-center justify-between mt-4">
                    <h2 class="text-3xl font-black tracking-tighter">System Control</h2>
                    <div class="flex p-1.5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                        <button onclick="tab('users')" id="t-users" class="px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-100">Users</button>
                        <button onclick="tab('cars')" id="t-cars" class="px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all text-slate-400">Vehicles</button>
                        <button onclick="tab('roads')" id="t-roads" class="px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all text-slate-400">Routes</button>
                    </div>
                </div>

                <div id="sec-users" class="space-y-6">
                    <form id="uForm" class="flex gap-4 p-6 bg-white rounded-[2rem] shadow-sm">
                        <input type="text" id="uName" placeholder="New Username" class="flex-1 p-4 rounded-2xl bg-slate-50 font-bold" required>
                        <input type="password" id="uPass" placeholder="Password" class="flex-1 p-4 rounded-2xl bg-slate-50 font-bold" required>
                        <button type="submit" class="bg-slate-900 text-white px-8 rounded-2xl font-bold text-xs uppercase tracking-widest hover-scale">Create</button>
                    </form>
                    <div id="list-users" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </div>
                
                <div id="sec-cars" class="hidden space-y-6">
                    <div class="flex gap-4 p-6 bg-white rounded-[2rem] shadow-sm">
                        <input type="text" id="vPlate" placeholder="PLATE #" class="flex-1 p-4 rounded-2xl bg-slate-50 font-black uppercase">
                        <input type="text" id="vTypeManual" placeholder="MODEL/TYPE" class="flex-1 p-4 rounded-2xl bg-slate-50 font-bold">
                        <button onclick="addVehicle()" class="bg-emerald-600 text-white px-8 rounded-2xl font-bold text-xs uppercase hover-scale shadow-lg shadow-emerald-100">Add</button>
                    </div>
                    <input type="text" id="vSearch" oninput="refresh()" placeholder="Search system database..." class="w-full p-4 rounded-2xl border-none bg-white text-sm font-bold shadow-sm">
                    <div id="list-cars" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </div>

                <div id="sec-roads" class="hidden space-y-6">
                    <div class="flex gap-4 p-6 bg-white rounded-[2rem] shadow-sm">
                        <input type="text" id="rName" placeholder="New Route Name" class="flex-1 p-4 rounded-2xl bg-slate-50 font-bold">
                        <button onclick="addRoute()" class="bg-slate-900 text-white px-10 rounded-2xl font-bold text-xl hover-scale">+</button>
                    </div>
                    <div id="list-roads" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDITjn7k_fWas0YJgOYh5daG3YARqWe9n0",
            authDomain: "cl21-oil-system.firebaseapp.com",
            projectId: "cl21-oil-system",
            storageBucket: "cl21-oil-system.firebasestorage.app",
            messagingSenderId: "482675024663",
            appId: "1:482675024663:web:036e7296a4fd0fd539cd52",
            measurementId: "G-XENJVHXNF1"
        };

        const app = initializeApp(firebaseConfig);
        const firestore = getFirestore(app);

        let session = null;
        let db = { users: [], config: { vehicles: [], routes: ['Phnom Penh'] }, logs: [] };
        let filteredResults = [];

        onSnapshot(collection(firestore, "users"), (s) => {
            db.users = s.docs.map(d => ({ id: d.id, ...d.data() }));
            if (db.users.length === 0) setDoc(doc(firestore, "users", "admin_default"), { u: 'admin', p: 'cambo@123', role: 'admin' });
            refresh();
        });

        onSnapshot(doc(firestore, "settings", "config"), (s) => {
            if (s.exists()) { db.config = s.data(); refresh(); }
            else { setDoc(doc(firestore, "settings", "config"), db.config); }
        });

        onSnapshot(query(collection(firestore, "oil_logs"), orderBy("date", "desc")), (s) => {
            db.logs = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLogs();
        });

        window.nav = (v) => {
            document.getElementById('view-dash').classList.toggle('hidden', v !== 'dash');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
            
            // UI Classes
            const dashBtn = "w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-700 shadow-sm";
            const inactiveBtn = "w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm text-slate-400 hover:bg-slate-50 transition-all";
            
            document.getElementById('d-dash').className = (v==='dash') ? dashBtn : inactiveBtn;
            document.getElementById('d-admin').className = (v==='admin') ? dashBtn : inactiveBtn;
            document.getElementById('m-dash').classList.toggle('active', v === 'dash');
            document.getElementById('m-admin').classList.toggle('active', v === 'admin');
        }

        window.tab = (t) => {
            ['users', 'cars', 'roads'].forEach(x => {
                document.getElementById(`sec-${x}`).classList.toggle('hidden', x !== t);
                const btn = document.getElementById(`t-${x}`);
                if(x===t) btn.className = "px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-100";
                else btn.className = "px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all text-slate-400";
            });
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = db.users.find(x => x.u === document.getElementById('uIn').value && x.p === document.getElementById('pIn').value);
            if(user) {
                session = user;
                if(user.role === 'admin') document.body.classList.add('is-admin');
                document.getElementById('loginSection').classList.add('animate__animated', 'animate__fadeOut');
                setTimeout(() => {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    init();
                }, 500);
            } else alert("Invalid identity or security key");
        };

        function init() {
            document.getElementById('iDate').valueAsDate = new Date();
            refresh();
        }

        window.searchPlate = (val) => {
            const dropdown = document.getElementById('plateDropdown');
            if(!val) { dropdown.classList.add('hidden'); return; }
            const results = db.config.vehicles.filter(v => v.plate.includes(val.toUpperCase()));
            if(results.length > 0) {
                dropdown.innerHTML = results.map(v => `
                    <div class="plate-item font-black p-4 hover:bg-emerald-50 transition-colors" onclick="selectPlate('${v.plate}', '${v.type}')">
                        ${v.plate} <span class="text-slate-400 font-bold text-xs ml-2 opacity-50">${v.type}</span>
                    </div>
                `).join('');
                dropdown.classList.remove('hidden');
            } else dropdown.classList.add('hidden');
        }

        window.selectPlate = (plate, type) => {
            document.getElementById('iPlate').value = plate;
            document.getElementById('iType').value = type;
            document.getElementById('plateDropdown').classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.group')) document.getElementById('plateDropdown').classList.add('hidden');
        });

        window.renderLogs = () => {
            const s = document.getElementById('fSearch').value.toUpperCase();
            const start = document.getElementById('fStart').value;
            const end = document.getElementById('fEnd').value;
            let total = 0;
            
            filteredResults = db.logs.filter(l => {
                const d = new Date(l.date); d.setHours(0,0,0,0);
                const userMatch = (session.role === 'admin' || l.user === session.u);
                const searchMatch = l.plate.includes(s);
                let rangeMatch = true;
                if (start) { const sDate = new Date(start); sDate.setHours(0,0,0,0); if (d < sDate) rangeMatch = false; }
                if (end) { const eDate = new Date(end); eDate.setHours(0,0,0,0); if (d > eDate) rangeMatch = false; }
                return userMatch && searchMatch && rangeMatch;
            });

            document.getElementById('logTable').innerHTML = filteredResults.map((l, idx) => {
                total += l.amt;
                return `<tr class="animate__animated animate__fadeInUp" style="animation-delay: ${idx * 0.05}s">
                    <td class="px-8 py-5 text-xs font-bold text-slate-400">${new Date(l.date).toLocaleDateString()}</td>
                    <td class="px-8 py-5 font-black text-slate-900 tracking-tight">${l.plate}</td>
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500">${l.type}</span>
                            <span class="text-xs font-bold text-slate-400">${l.route}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 admin-only text-[10px] font-bold text-emerald-600/50 uppercase">${l.user}</td>
                    <td class="px-8 py-5 text-right font-black text-slate-900">${l.amt.toFixed(2)} <span class="text-slate-300 font-bold text-[10px]">L</span></td>
                    <td class="px-8 py-5 text-right admin-only">
                        <button onclick="delLog('${l.id}')" class="w-8 h-8 rounded-lg hover:bg-red-50 text-red-200 hover:text-red-500 transition-all">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="6" class="py-20 text-center"><div class="opacity-20 font-black text-4xl">NO DATA</div></td></tr>';
            
            document.getElementById('totalDisplay').innerText = total.toFixed(2);
        }

        window.exportData = () => {
            if(filteredResults.length === 0) return alert("No data to export");
            let csv = "Date,Plate,Type,Route,User,Liters\n";
            filteredResults.forEach(l => csv += `${new Date(l.date).toLocaleDateString()},${l.plate},${l.type},${l.route},${l.user},${l.amt}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'CL21_Report.csv'; a.click();
        };

        window.refresh = () => {
            renderLogs();
            const vS = document.getElementById('vSearch').value.toUpperCase();
            document.getElementById('list-users').innerHTML = db.users.map((u) => `<div class="p-4 bg-white rounded-2xl flex justify-between items-center text-xs font-black shadow-sm border border-slate-50">${u.u} ${u.u !== 'admin' ? `<button onclick="delUser('${u.id}')" class="text-red-400">DELETE</button>` : '<span class="text-emerald-500">MASTER</span>'}</div>`).join('');
            document.getElementById('list-cars').innerHTML = db.config.vehicles.filter(v => v.plate.includes(vS)).map((v) => `<div class="p-4 bg-white rounded-2xl flex justify-between items-center text-xs font-black shadow-sm border border-slate-50"><div>${v.plate}<br><span class="text-[9px] text-slate-300">${v.type}</span></div> <button onclick="delV('${v.plate}')" class="text-red-400">REMOVE</button></div>`).join('');
            document.getElementById('list-roads').innerHTML = db.config.routes.map((r) => `<div class="p-3 bg-white rounded-xl flex justify-between items-center text-[10px] font-black shadow-sm border border-slate-50">${r} <button onclick="delR('${r}')" class="text-red-400">×</button></div>`).join('');
            document.getElementById('iRoute').innerHTML = db.config.routes.map(r => `<option>${r}</option>`).join('');
        }

        document.getElementById('oilForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i>';
            const plate = document.getElementById('iPlate').value.toUpperCase();
            const v = db.config.vehicles.find(v => v.plate === plate);
            if(!v) { alert("Vehicle Plate Not Found!"); btn.innerHTML = '<i class="fa-solid fa-plus text-xl"></i>'; return; }
            await addDoc(collection(firestore, "oil_logs"), { plate, type: v.type, route: document.getElementById('iRoute').value, amt: parseFloat(document.getElementById('iAmt').value), user: session.u, date: new Date(document.getElementById('iDate').value).toISOString() });
            document.getElementById('iAmt').value = ''; document.getElementById('iPlate').value = ''; document.getElementById('iType').value = '';
            btn.innerHTML = '<i class="fa-solid fa-plus text-xl"></i>';
        };

        // Standard Utility Functions
        window.addVehicle = async () => { 
            const p = document.getElementById('vPlate').value.trim().toUpperCase(); 
            const t = document.getElementById('vTypeManual').value.trim().toUpperCase(); 
            if(!p || !t) return; 
            db.config.vehicles.push({ plate: p, type: t }); 
            await setDoc(doc(firestore, "settings", "config"), db.config);
            document.getElementById('vPlate').value = ''; document.getElementById('vTypeManual').value = ''; 
        };
        window.delV = async (p) => { if(confirm("Remove vehicle?")) { db.config.vehicles = db.config.vehicles.filter(v => v.plate !== p); await setDoc(doc(firestore, "settings", "config"), db.config); }};
        window.delR = async (r) => { if(confirm("Remove route?")) { db.config.routes = db.config.routes.filter(x => x !== r); await setDoc(doc(firestore, "settings", "config"), db.config); }};
        window.delLog = async (id) => { if(confirm("Delete log entry?")){ await deleteDoc(doc(firestore, "oil_logs", id)); }};
        window.addRoute = async () => { const r = document.getElementById('rName').value.trim(); if(!r) return; db.config.routes.push(r); await setDoc(doc(firestore, "settings", "config"), db.config); document.getElementById('rName').value = ''; };
        window.delUser = async (id) => { if(confirm("Delete user account?")) await deleteDoc(doc(firestore, "users", id)); };
        document.getElementById('uForm').onsubmit = async (e) => { e.preventDefault(); const u = document.getElementById('uName').value.trim(); const p = document.getElementById('uPass').value.trim(); if(!u || !p) return; await addDoc(collection(firestore, "users"), { u, p, role: 'staff' }); document.getElementById('uName').value = ''; document.getElementById('uPass').value = ''; };

    </script>
</body>
</html>
